version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: host.docker.internal
      APP_PORT: 11080
    extra_hosts:
      - "host.docker.internal:host-gateway"

  server:
    image: ghcr.io/koush/scrypted:latest@sha256:f23251dad07cf02b4b6b2e364e7948ab9fb77656e31f226186c2ba5304ebd2cd
    restart: on-failure
    stop_grace_period: 1m
    network_mode: host
    environment:
      TZ: ${TZ:-Etc/UTC}
    volumes:
      - ${APP_DATA_DIR}/volume:/server/volume
    logging:
      driver: none
