category: Networking
name: Privado VPN
version: "1.2.0"
tagline: Shared Privado SOCKS proxy for media apps
icon: https://raw.githubusercontent.com/lucasilverentand/umbrel-apps/main/lucasilverentand-privado-vpn/icon.svg
description: >-
  Privado VPN runs the shared SOCKS proxy used by the media stack. The browser
  dashboard is enabled by default so you can add your Privado login, check
  WireGuard, SOCKS, handshake, and public IP status after install, and let the
  proxy select an available server automatically.
releaseNotes: >-
  Redesigns the dashboard around connection readiness, adds clear setup,
  connecting, degraded, and offline states, and provides a restart action.
  Saved credentials are now detected from persistent storage, and automatic
  refresh pauses while you edit the login form.
