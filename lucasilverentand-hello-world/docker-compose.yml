version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: lucasilverentand-hello-world_server_1
      APP_PORT: 80

  server:
    image: nginx:1.27-alpine@sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10
    restart: on-failure
    command:
      - /bin/sh
      - -c
      - |
        cat > /usr/share/nginx/html/index.html <<'HTML'
        <!doctype html>
        <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Hello World</title>
            <style>
              html {
                color-scheme: dark;
                font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                background: #101114;
                color: #f4f4f5;
              }

              body {
                min-height: 100vh;
                margin: 0;
                display: grid;
                place-items: center;
              }

              main {
                width: min(520px, calc(100vw - 48px));
              }

              h1 {
                margin: 0 0 12px;
                font-size: 40px;
                line-height: 1.1;
                letter-spacing: 0;
              }

              p {
                margin: 0;
                color: #b8bcc6;
                font-size: 17px;
                line-height: 1.6;
              }
            </style>
          </head>
          <body>
            <main>
              <h1>Hello from umbrelOS.</h1>
              <p>This test app confirms the custom app store package installed and the app proxy is serving traffic.</p>
            </main>
          </body>
        </html>
        HTML
        nginx -g 'daemon off;'
