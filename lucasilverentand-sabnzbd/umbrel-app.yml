manifestVersion: 1
id: lucasilverentand-sabnzbd
category: Media
name: SABnzbd
version: "5.0.4-umbrel.3"
tagline: Usenet download client for the Arr stack
icon: https://raw.githubusercontent.com/lucasilverentand/umbrel-apps/main/lucasilverentand-sabnzbd/icon.svg
description: >-
  SABnzbd is the Usenet download client for the media stack. Installation
  automatically applies the Privado SOCKS5 proxy, shared download paths, and
  the movies, movies-4k, tv, tv-4k, and music categories. You only add your
  Usenet provider details.
releaseNotes: >-
  Adds a persisted random internal API key so Sonarr, Radarr, and Lidarr can
  register SABnzbd automatically. Provider credentials remain user supplied,
  and Umbrel's account login still protects the browser UI.
developer: SABnzbd
website: https://sabnzbd.org
dependencies:
  - lucasilverentand-privado-vpn
repo: https://github.com/sabnzbd/sabnzbd
support: https://github.com/sabnzbd/sabnzbd/issues
port: 29984
