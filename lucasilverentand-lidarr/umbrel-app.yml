tagline: Music manager for the Arr stack
icon: https://raw.githubusercontent.com/lucasilverentand/umbrel-apps/main/lucasilverentand-lidarr/icon.svg
description: >-
  Lidarr manages music downloads through the shared Prowlarr, qBittorrent, and
  SABnzbd services. Installation creates the /data/music root folder, configures
  both download clients with the music category, and registers Lidarr in
  Prowlarr.
releaseNotes: >-
  Adds idempotent install-time configuration for the root folder, qBittorrent,
  SABnzbd, and full Prowlarr indexer synchronization using persisted random
  internal API credentials.
