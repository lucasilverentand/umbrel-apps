version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: lucasilverentand-bazarr_server_1
      APP_PORT: 6767

  server:
    image: lscr.io/linuxserver/bazarr:latest@sha256:5d916d07404296ec35ee726e13e0e558f05952724cf494a7f009d913fb2b12f3
    restart: on-failure
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: ${TZ:-Etc/UTC}
      SONARR_URL: http://lucasilverentand-sonarr_server_1:8989
      SONARR_4K_URL: http://lucasilverentand-sonarr-4k_server_1:8989
      RADARR_URL: http://lucasilverentand-radarr_server_1:7878
      RADARR_4K_URL: http://lucasilverentand-radarr-4k_server_1:7878
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
      - ${UMBREL_ROOT}/data/storage/downloads:/data

  configurator:
    image: python:3.13-alpine@sha256:399babc8b49529dabfd9c922f2b5eea81d611e4512e3ed250d75bd2e7683f4b0
    user: "1000:1000"
    restart: on-failure
    depends_on:
      - server
    command:
      - python3
      - /bootstrap.py
    environment:
      BAZARR_URL: http://lucasilverentand-bazarr_server_1:6767
      SONARR_HOST: lucasilverentand-sonarr_server_1
      SONARR_PORT: "8989"
      SONARR_API_KEY: ${LUCASILVERENTAND_SONARR_API_KEY:-}
      RADARR_HOST: lucasilverentand-radarr_server_1
      RADARR_PORT: "7878"
      RADARR_API_KEY: ${LUCASILVERENTAND_RADARR_API_KEY:-}
      PRIVADO_VPN_SOCKS_HOST: ${PRIVADO_VPN_SOCKS_HOST:-lucasilverentand-privado-vpn_server_1}
      PRIVADO_VPN_SOCKS_PORT: ${PRIVADO_VPN_SOCKS_PORT:-1080}
    volumes:
      - ./bazarr-bootstrap.py.template:/bootstrap.py:ro
      - ${APP_DATA_DIR}/data/config:/config:ro
