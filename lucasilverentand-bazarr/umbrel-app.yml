manifestVersion: 1
id: lucasilverentand-bazarr
category: Media
name: Bazarr
version: "1.6.0-umbrel.1"
tagline: Subtitle manager for Sonarr and Radarr
icon: https://raw.githubusercontent.com/lucasilverentand/umbrel-apps/main/lucasilverentand-bazarr/icon.svg
description: >-
  Bazarr manages subtitles for the standard Sonarr and Radarr libraries.
  Installation connects both HD services and routes subtitle-provider traffic
  through Privado. Bazarr supports only one Sonarr and one Radarr instance, so
  the separate 4K libraries require a second Bazarr package.
releaseNotes: >-
  Automatically connects the HD Sonarr and Radarr services and applies the
  Privado SOCKS5 proxy. No Arr API keys or Bazarr login are hardcoded.
developer: Bazarr
website: https://www.bazarr.media
dependencies:
  - lucasilverentand-privado-vpn
  - lucasilverentand-sonarr
  - lucasilverentand-sonarr-4k
  - lucasilverentand-radarr
  - lucasilverentand-radarr-4k
