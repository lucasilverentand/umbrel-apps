version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: lucasilverentand-sonarr-4k_server_1
      APP_PORT: 8989

  server:
    image: lscr.io/linuxserver/sonarr:latest@sha256:633e0e66d85ce4e9172608a37d3d24e124b3e485fc0d946f533c3bb5875227e9
    restart: on-failure
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        set -eu
        config=/config/config.xml
        mkdir -p /config
        [ -f "$$config" ] || printf '<Config>\n</Config>\n' > "$$config"

        set_xml_value() {
          key=$$1
          value=$$2
          temporary=$$(mktemp /config/.umbrel-config.XXXXXX)
          XML_KEY="$$key" XML_VALUE="$$value" awk '
            BEGIN {
              key = ENVIRON["XML_KEY"]
              value = ENVIRON["XML_VALUE"]
              open = "<" key ">"
              closing = "</" key ">"
              written = 0
            }
            index($$0, open) && index($$0, closing) {
              print "  " open value closing
              written = 1
              next
            }
            index($$0, "</Config>") && !written {
              print "  " open value closing
              written = 1
            }
            { print }
            END { if (!written) exit 42 }
          ' "$$config" > "$$temporary"
          cat "$$temporary" > "$$config"
          rm -f "$$temporary"
        }

        set_xml_value AuthenticationMethod External
        set_xml_value AuthenticationRequired DisabledForLocalAddresses
        set_xml_value ApiKey "$$SERVICE_API_KEY"
        mkdir -p "$$SONARR_ROOT_FOLDER"
        chown "$$PUID:$$PGID" "$$SONARR_ROOT_FOLDER"
        echo "Applied Sonarr 4K Umbrel authentication and integration credentials"
        exec /init
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: ${TZ:-Etc/UTC}
      SERVICE_API_KEY: ${LUCASILVERENTAND_SONARR_4K_API_KEY:-}
      SONARR_CATEGORY: tv-4k
      SONARR_ROOT_FOLDER: /data/series-4k
      PROWLARR_URL: http://lucasilverentand-prowlarr_server_1:9696
      QBITTORRENT_URL: http://lucasilverentand-qbittorrent_server_1:8080
      SABNZBD_URL: http://lucasilverentand-sabnzbd_server_1:8080
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
      - ${UMBREL_ROOT}/data/storage/downloads:/data

  configurator:
    image: python:3.13-alpine@sha256:399babc8b49529dabfd9c922f2b5eea81d611e4512e3ed250d75bd2e7683f4b0
    user: "1000:1000"
    restart: on-failure
    depends_on:
      - server
    command:
      - python3
      - /bootstrap.py
    environment:
      SERVICE_URL: ${LUCASILVERENTAND_SONARR_4K_URL:-http://lucasilverentand-sonarr-4k_server_1:8989}
      SERVICE_API_KEY: ${LUCASILVERENTAND_SONARR_4K_API_KEY:-}
      ROOT_FOLDER: /data/series-4k
      DOWNLOAD_CATEGORY: tv-4k
      QBITTORRENT_URL: http://lucasilverentand-qbittorrent_server_1:8080
      SABNZBD_URL: ${LUCASILVERENTAND_SABNZBD_URL:-http://lucasilverentand-sabnzbd_server_1:8080}
      SABNZBD_API_KEY: ${LUCASILVERENTAND_SABNZBD_API_KEY:-}
      PROWLARR_URL: ${LUCASILVERENTAND_PROWLARR_URL:-http://lucasilverentand-prowlarr_server_1:9696}
      PROWLARR_API_KEY: ${LUCASILVERENTAND_PROWLARR_API_KEY:-}
      PROWLARR_APPLICATION_NAME: Sonarr 4K
      PROWLARR_APPLICATION_IMPLEMENTATION: Sonarr
    volumes:
      - ./servarr-bootstrap.py.template:/bootstrap.py:ro
