category: Media
name: Prowlarr
version: "2.3.5.5327-umbrel.4"
tagline: Indexer manager for the Arr stack
icon: https://raw.githubusercontent.com/lucasilverentand/umbrel-apps/main/lucasilverentand-prowlarr/icon.svg
description: >-
  Prowlarr manages indexers for Sonarr, Sonarr 4K, Radarr, Radarr 4K, and Lidarr.
  Installation automatically routes indexer traffic through Privado VPN and
  keeps local Arr and FlareSolverr connections outside the proxy.
releaseNotes: >-
  Adds a persistent random internal API key and automatically registers
  FlareSolverr with a reusable flaresolverr tag. Sonarr, Radarr, and Lidarr
  packages can now register themselves with full indexer sync during
  installation.
