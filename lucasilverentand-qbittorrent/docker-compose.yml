version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: lucasilverentand-qbittorrent_server_1
      APP_PORT: 8080

  server:
    image: lscr.io/linuxserver/qbittorrent:latest@sha256:d8488fb24969bb0954cf64a1ca1cf7a763031641ba4246734964faea6f0b807a
    restart: on-failure
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: ${TZ:-Etc/UTC}
      WEBUI_PORT: "8080"
      TORRENTING_PORT: "6881"
      PRIVADO_VPN_SOCKS_HOST: lucasilverentand-privado-vpn_server_1
      PRIVADO_VPN_SOCKS_PORT: "1080"
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
      - ${APP_DATA_DIR}/data/50-umbrel-config:/custom-cont-init.d/50-umbrel-config:ro
      - ${UMBREL_ROOT}/data/storage/downloads:/data
