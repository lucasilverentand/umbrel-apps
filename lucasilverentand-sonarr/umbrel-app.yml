tagline: HD TV series manager
icon: https://raw.githubusercontent.com/lucasilverentand/umbrel-apps/main/lucasilverentand-sonarr/icon.svg
description: >-
  Sonarr manages HD TV series and imports completed downloads from qBittorrent
  or SABnzbd. Installation creates the /data/series root folder, configures both
  download clients with the tv category, and registers Sonarr in Prowlarr.
releaseNotes: >-
  Mounts Umbrel's network storage folder at /network so TV libraries on a
  host-mounted network share can be managed alongside local downloads.
