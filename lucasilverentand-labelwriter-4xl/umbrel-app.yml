manifestVersion: 1
id: lucasilverentand-labelwriter-4xl
category: Networking
name: DYMO LabelWriter
version: "1.3.1"
tagline: Share a USB DYMO LabelWriter with devices on your network
icon: https://raw.githubusercontent.com/lucasilverentand/umbrel-apps/main/lucasilverentand-labelwriter-4xl/icon.svg
description: >-
  Turn a USB-connected DYMO LabelWriter into a network print server using CUPS.
  Connect a supported DYMO LabelWriter directly to your Umbrel device, then use
  the CUPS web interface to manage the printer. The LabelWriter 4XL is detected
  and configured automatically; drivers for other DYMO LabelWriter models are
  also included. The app needs direct access to the Umbrel device's USB bus and
  publishes TCP port 631 so computers and phones on your local network can print
  using IPP. Sign in to CUPS as admin with the password shown by Umbrel.
releaseNotes: >-
  Initial Umbrel package for LabelWriter 4XL 1.3.1. Includes persistent CUPS
  configuration, automatic USB printer detection, the full DYMO LabelWriter
  driver set, Umbrel-managed admin credentials, browser administration, and
  direct IPP access on TCP port 631.
developer: Luca Silverentand
