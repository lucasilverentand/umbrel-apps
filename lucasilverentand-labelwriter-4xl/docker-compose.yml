version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: lucasilverentand-labelwriter-4xl_server_1
      APP_PORT: 631

  cups_config_init:
    image: ghcr.io/lucasilverentand/labelwriter-4xl:1.3.1@sha256:2a6ec81bc5b2367f44a6591b69b79aa58751e244ada8907d3d7f11e1e7933cf8
    user: root
    entrypoint:
      - /bin/bash
      - -c
    command:
      - |
        if [ ! -f /persistent-cups/cupsd.conf ]; then
          cp -a /etc/cups/. /persistent-cups/
        fi
    volumes:
      - ${APP_DATA_DIR}/data/cups:/persistent-cups
    restart: on-failure

  server:
    image: ghcr.io/lucasilverentand/labelwriter-4xl:1.3.1@sha256:2a6ec81bc5b2367f44a6591b69b79aa58751e244ada8907d3d7f11e1e7933cf8
    restart: on-failure
    depends_on:
      cups_config_init:
        condition: service_completed_successfully
    environment:
      CUPS_ADMIN_USER: admin
      CUPS_ADMIN_PASSWORD: "${APP_PASSWORD}"
      ENABLE_AVAHI: "false"
      TZ: ${TZ:-Etc/UTC}
    ports:
      # Direct LAN access is required for IPP printing outside the Umbrel proxy.
      - "631:631/tcp"
    volumes:
      - ${APP_DATA_DIR}/data/cups:/etc/cups
      # USB access is required so CUPS can discover the connected label printer.
      - /dev/bus/usb:/dev/bus/usb
    device_cgroup_rules:
      - "c 189:* rmw"
